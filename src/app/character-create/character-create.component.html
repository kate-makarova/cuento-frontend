<h1><span i18n="@@topiccreate.title">Start a new character</span></h1>
<div id="post-form" class="formal">
  <form id="post" class="container" (submit)="onSubmit($event)">
    <fieldset>
      <legend><span i18n="@@topiccreate.writeMessage">Write your message and click "Send"</span></legend>
      <div class="fs-box hashelp">
        <p class="inputfield required longinput">
          <label for="fld3"><ng-container i18n="@@topiccreate.characterName">Name</ng-container> <em><ng-container i18n="@@topiccreate.required">(Required)</ng-container></em></label><br />
          <span class="input"><input id="fld3" type="text" name="req_name" [value]="characterName" size="80" maxlength="70" /></span>
        </p>

        <p class="inputfield required longinput">
          <label for="fld4">Avatar URL</label><br />
          <span class="input"><input id="fld4" type="text" name="req_avatar" [value]="characterAvatar" size="80" maxlength="255" /></span>
        </p>

        <app-faction-paths
          [initialFactions]="initialData?.factions ?? []"
          (factionsChange)="onFactionsChanged($event)">
        </app-faction-paths>

      </div>
    </fieldset>

    <fieldset>
      @for (field of characterTemplate(); track field.order) {
        <div class="fs-box hashelp">
          <p class="inputfield required">
            <app-field-input [field]="field" [fieldValue]="getFieldValue(field.machine_field_name)"></app-field-input>
          </p>
        </div>
      }
    </fieldset>

    <p class="formsubmit">
      <input type="submit" class="button submit" name="submit" value="Send" i18n-value="@@topiccreate.send" accesskey="s" />
      @if (cancel.observed) {
        <button type="button" class="button" (click)="onCancel()" i18n="@@topiccreate.cancel">Cancel</button>
      } @else {
        <input type="submit" class="button preview" name="preview" value="Preview" i18n-value="@@topiccreate.preview" accesskey="p" />
      }
    </p>
  </form>
</div>
<div id="ajaxpostpreview"></div>
